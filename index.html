<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tempahan Bilik Khas</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="header">
<h2>🏫 Sistem Tempahan Bilik Khas</h2>
</div>

<div class="layout">

<!-- FORM -->
<div class="card">
<h3>Tempahan Baru</h3>
<form id="bookingForm">
<label>Nama</label>
<input type="text" id="nama" required>

<label>Bilik</label>
<select id="bilik">
<option>Makmal 1</option>
<option>Makmal 2</option>
<option>Pusat Sumber</option>
<option>Bilik Mesyuarat</option>
<option>Dewan Besar</option>
</select>

<label>Waktu Mula</label>
<input type="number" id="mula" min="1" max="17" required>

<label>Waktu Tamat</label>
<input type="number" id="tamat" min="1" max="17" required>

<button type="submit">Tempah</button>
</form>
</div>

<!-- DASHBOARD -->
<div class="card">
<h3>Dashboard Tempahan</h3>
<table id="table">
<thead>
<tr>
<th>Nama</th>
<th>Bilik</th>
<th>Slot</th>
<th>Tarikh</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="report">
<input type="date" id="startDate">
<input type="date" id="endDate">
<button onclick="generatePDF()">Jana PDF</button>
</div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
